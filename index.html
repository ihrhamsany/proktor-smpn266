<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Proktor - CBT SMPN 266 Jakarta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi background gradient yang futuristik dan soft */
        .bg-futuristic {
            background: linear-gradient(-45deg, #e0c3fc, #8ec5fc, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Efek Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .glow-button {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        .glow-button:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.8);
        }

        /* Animasi loading */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-futuristic min-h-screen font-sans text-gray-800 flex flex-col items-center justify-center relative">

    <!-- Ornamen Dekorasi Cahaya Blur -->
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse pointer-events-none" style="animation-delay: 2s;"></div>

    <!-- HALAMAN PERSIAPAN (LANDING) -->
    <div id="setup-page" class="glass-card rounded-[2rem] p-10 max-w-lg w-full text-center relative z-10 mx-4 transition-all duration-500">
        
        <img src="https://smpnegeri266jkt.sch.id/wp-content/uploads/2023/06/cropped-1_Logo_SMP.-N-266-2.png" 
             alt="Logo SMPN 266" 
             class="w-24 h-24 object-contain mx-auto mb-6 drop-shadow-lg" 
             onerror="this.src='cropped-1_Logo_SMP.-N-266-2.webp'">
        
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-800 mb-1 leading-tight tracking-wide">
            PORTAL MONITORING PROKTOR
        </h1>
        <h2 class="text-md font-bold text-gray-600 mb-8 tracking-widest">CBT SMPN 266 JAKARTA</h2>

        <button onclick="launchApp()" class="w-full glow-button bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-transform transform hover:-translate-y-1 focus:outline-none uppercase tracking-widest">
            Buka Dashboard
        </button>
    </div>

    <!-- HALAMAN APLIKASI (IFRAME PORTAL) -->
    <div id="browser-page" class="hidden w-full h-screen bg-gray-50 flex-col relative z-20">
        
        <!-- Header Navigasi Proktor -->
        <div class="bg-indigo-900 text-indigo-100 px-4 py-3 flex justify-between items-center text-sm shadow-md z-20">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-800 p-1.5 rounded-lg flex space-x-2">
                    <!-- Tombol Kembali/Refresh Internal -->
                    <button onclick="refreshIframe()" class="hover:bg-indigo-600 p-1 rounded transition tooltip" title="Muat Ulang">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <!-- Tombol Home Admin -->
                    <button onclick="goHome()" class="hover:bg-indigo-600 p-1 rounded transition tooltip" title="Beranda Admin">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    </button>
                </div>
                <span class="font-bold tracking-wider hidden sm:inline">DASHBOARD MONITORING</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="toggleFullscreen()" class="text-indigo-200 hover:text-white transition flex items-center text-xs border border-indigo-700 px-2 py-1 rounded">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    Layar Penuh
                </button>
                <button onclick="exitApp()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded transition font-bold text-xs shadow-sm">
                    Tutup Portal
                </button>
            </div>
        </div>

        <!-- Indikator Loading -->
        <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-10">
            <div class="flex flex-col items-center">
                <div class="loader mb-4"></div>
                <p class="text-indigo-600 font-semibold animate-pulse">Memuat aplikasi...</p>
            </div>
        </div>
        
        <!-- Iframe Aplikasi -->
        <iframe id="proctor-frame" 
                name="proctor-frame"
                src="" 
                class="w-full flex-grow border-none relative z-0"
                allow="fullscreen; autoplay">
        </iframe>
    </div>

    <script>
        const PROCTOR_URL = "https://sman45jkt.com/#/admin";

        function launchApp() {
            // Sembunyikan Landing, Tampilkan Browser
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('browser-page').classList.remove('hidden');
            document.getElementById('browser-page').classList.add('flex');
            
            const frame = document.getElementById('proctor-frame');
            
            // Tambahkan event penahan tab baru setiap kali halaman di dalam iframe dimuat ulang
            frame.addEventListener('load', handleIframeLoad);

            // Muat URL
            frame.src = PROCTOR_URL;
        }

        function goHome() {
            document.getElementById('loading-indicator').style.display = 'flex';
            document.getElementById('proctor-frame').src = PROCTOR_URL;
        }

        function refreshIframe() {
            document.getElementById('loading-indicator').style.display = 'flex';
            const frame = document.getElementById('proctor-frame');
            // Coba reload secara internal, jika gagal karena CORS, setel ulang URL
            try {
                frame.contentWindow.location.reload();
            } catch (e) {
                frame.src = frame.src; 
            }
        }

        function exitApp() {
            document.getElementById('proctor-frame').src = "";
            document.getElementById('browser-page').classList.add('hidden');
            document.getElementById('browser-page').classList.remove('flex');
            document.getElementById('setup-page').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Gagal mengaktifkan layar penuh: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- SISTEM PENAHAN TAB BARU (INTERCEPTOR) ---
        function handleIframeLoad() {
            document.getElementById('loading-indicator').style.display = 'none';
            
            try {
                const frame = document.getElementById('proctor-frame');
                const win = frame.contentWindow;
                const doc = win.document;
                
                // 1. INJEKSI TAG <BASE>
                let baseTag = doc.querySelector('base');
                if (!baseTag) {
                    baseTag = doc.createElement('base');
                    doc.head.appendChild(baseTag);
                }
                baseTag.target = '_self'; // Memaksa semua rute default untuk buka di tempat yang sama

                // 2. TIMPA FUNGSI WINDOW.OPEN (Untuk tombol cetak kartu, laporan, dll)
                win.open = function(url, target, features) {
                    if (url) {
                        frame.src = url; 
                    }
                    return win;
                };

                // 3. UBAH ATRIBUT TARGET PADA ELEMEN YANG SUDAH ADA
                const forceSelfTarget = () => {
                    const elements = doc.querySelectorAll('[target="_blank"], [target="_new"]');
                    elements.forEach(el => {
                        el.target = '_self';
                    });
                };
                
                forceSelfTarget();
                
                // Pantau jika aplikasi merender tombol baru (React/Vue/AJAX)
                const observer = new MutationObserver(forceSelfTarget);
                observer.observe(doc.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['target'] });

                // 4. CEGAT KLIK MENDADAK
                doc.addEventListener('click', function(e) {
                    let target = e.target;
                    while (target && target !== doc) {
                        if (target.tagName === 'A' && (target.target === '_blank' || target.target === '_new')) {
                            target.target = '_self';
                            break;
                        }
                        target = target.parentNode;
                    }
                }, true);

            } catch (error) {
                // Sengaja dikosongkan (silent fail). 
                // Jika error muncul (karena dijalankan beda domain), aplikasi tidak akan berhenti,
                // hanya saja sistem penahan tab baru tidak bisa bekerja sempurna.
                console.log("CORS mencegah injeksi script penahan tab. Pastikan file ini diupload di sman45jkt.com");
            }
        }
    </script>
</body>
</html>
